<?xml version="1.0" standalone="no"?>
<!-- Test for relative q followed by t (smooth quadratic curveto).
     Bug: generate_path_bcurveto set quad_x/quad_y BEFORE converting
     relative coords to absolute, causing wrong t command reflections. -->
<svg width="300" height="200" viewBox="0 0 300 200"
     xmlns="http://www.w3.org/2000/svg">
  <path fill="none" stroke="black" stroke-width="2"
    d="M 0,100 q 50,-100 100,0 t 100,0 t 100,0" />
</svg>
