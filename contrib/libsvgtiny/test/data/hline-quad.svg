<?xml version="1.0" standalone="no"?>
<!-- Test for H (horizontal lineto) followed by T (smooth quadratic curveto).
     Bug: generate_path_hline assigned quad_x instead of quad_y,
     causing wrong reflected control point in the T command. -->
<svg width="300" height="200" viewBox="0 0 300 200"
     xmlns="http://www.w3.org/2000/svg">
  <path fill="none" stroke="black" stroke-width="2"
    d="M 0,100 Q 50,0 100,100 H 150 T 200,100" />
</svg>
